proxy:
  gtpc:
    listen: "0.0.0.0:2123"
    advertise_address_ipv4: "127.0.0.1"
  gtpu:
    listen: "0.0.0.0:2152"
    advertise_address_ipv4: "127.0.0.1"
  timeouts:
    session_idle: "15m"
    cleanup_interval: "30s"

api:
  listen: "0.0.0.0:8080"

log:
  level: "info"

database:
  path: "./gtp_proxy.db"
